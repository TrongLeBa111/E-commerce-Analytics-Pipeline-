version: "3.8"

x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    PYTHONPATH: /opt/airflow
    POSTGRES_HOST: postgres              # ← thêm
    POSTGRES_USER: ${POSTGRES_USER}      # ← thêm
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # ← thêm
    POSTGRES_DB: ${POSTGRES_DB}

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./ingestion:/opt/airflow/ingestion
    - ./ecommerce_pipeline:/opt/airflow/ecommerce_pipeline
    - ./Data:/opt/airflow/Data
    - ./.env:/opt/airflow/.env
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: de_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB},airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_schemas.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init_airflow_db.sql:/docker-entrypoint-initdb.d/02_airflow.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]  # ← thêm -d
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    healthcheck:
      test: [ "CMD-SHELL", "airflow db check" ]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-webserver:
      <<: *airflow-common
      container_name: airflow_webserver
      command: webserver
      ports:
        - "8080:8080"
      depends_on:
        postgres:
          condition: service_healthy
        airflow-init: # ← thêm
          condition: service_completed_successfully
      healthcheck:
        test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
        interval: 30s
        timeout: 10s
        retries: 5

  airflow-scheduler:
      <<: *airflow-common
      container_name: airflow_scheduler
      command: scheduler
      depends_on:
        postgres:
          condition: service_healthy
        airflow-init: # ← thêm
          condition: service_completed_successfully

volumes:
  postgres_data: